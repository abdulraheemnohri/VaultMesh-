name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            artifact_name: android
            artifact_path: build/app/outputs/
          - os: ubuntu-latest
            target: linux
            artifact_name: linux
            artifact_path: build/linux/x64/release/bundle/
          - os: macos-latest
            target: ios
            artifact_name: ios
            artifact_path: build/ios/iphoneos/
          - os: macos-latest
            target: macos
            artifact_name: macos
            artifact_path: build/macos/Build/Products/Release/
          - os: windows-latest
            target: windows
            artifact_name: windows
            artifact_path: build/windows/runner/Release/

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable platforms
        run: |
          flutter config --enable-android
          flutter config --enable-ios
          flutter config --enable-linux
          flutter config --enable-macos
          flutter config --enable-windows

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - name: Build for Android
        if: matrix.target == 'android'
        run: |
          flutter build apk --release --split-per-abi
          flutter build appbundle --release

      - name: Build for Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          flutter build linux --release --target-platform linux-x64 --linux-package deb

      - name: Build for iOS
        if: matrix.target == 'ios'
        run: flutter build ipa --release --no-codesign

      - name: Build for macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Build for Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: android
          path: releases/android

      - uses: actions/download-artifact@v3
        with:
          name: linux
          path: releases/linux

      - uses: actions/download-artifact@v3
        with:
          name: ios
          path: releases/ios

      - uses: actions/download-artifact@v3
        with:
          name: macos
          path: releases/macos

      - uses: actions/download-artifact@v3
        with:
          name: windows
          path: releases/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            releases/android/**
            releases/linux/**
            releases/ios/**
            releases/macos/**
            releases/windows/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}