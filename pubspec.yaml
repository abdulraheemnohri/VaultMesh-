name: vaultmesh_flutter_x
description: A secure, offline Flutter app for managing sensitive data.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^8.0.0
  encrypt: ^5.0.1
  local_auth: ^2.1.7
  path_provider: ^2.1.1
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  intl: ^0.18.1
  file_picker: ^5.3.3
  path: ^1.8.3
  crypto: ^3.0.3
  flutter_markdown: ^0.6.15
  url_launcher: ^6.1.11
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/