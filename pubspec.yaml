name: vaultmesh_flutter_x
description: A secure, offline-first Flutter app for managing sensitive data.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  encrypt: ^5.0.1
  local_auth: ^2.1.7
  flutter_secure_storage: ^8.0.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  flutter_markdown: ^0.6.15
  file_picker: ^5.3.3
  url_launcher: ^6.1.11
  shared_preferences: ^2.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.0.0
  web_socket_channel: ^2.4.0
  http: ^0.13.5
  package_info_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/